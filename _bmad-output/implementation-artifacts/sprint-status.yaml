  epic-23: in-progress # front-end framework for the projection layer — Vue + Nuxt 3 (universal/SSR) over the IR (SCP 2026-07-20); ADR 0009 ACCEPTED; spike-first; depends on Epic 22's IR; does not disturb Epic 7; opened 2026-07-23 with feasibility spike 23.1 (create-story)
  23-1-spike-nuxt-over-ir-feasibility: done # CODE REVIEW 2026-07-23 (bmad-code-review, 3 adversarial layers): 4 decision-needed + 20 patch findings, all resolved/applied; 3 deferred to deferred-work.md. Structural discipline HELD (quarantine real, src/tests untouched, pre-existing golden drift correctly isolated). Findings concentrated on EVIDENCE-vs-CLAIM gaps, all now corrected in the report: (1) AC#1 NARROWED to "renders without JS" — navigability was proven only for the spike's own 4-link index; the surface's in-content links (`code/…`, `adrs/…`) do not resolve against Nuxt routes, the same mismatch that makes crawlLinks unusable → route-mapping added to 23.3 scope. (2) AC#2 made CONDITIONAL — parity measures v-html INJECTION fidelity, not a Vue reimplementation, so the "~889 LOC Markdig renderers are a non-risk" finding holds ONLY IF the canonical IR carries rendered prose HTML, which ADR 0008 does NOT specify → now a HARD REQUIREMENT on 22.2. (3) The "every number is reproducible with npm run measure" claim was FALSE; measure.mjs now computes the <main> byte columns, the golden-gate normalization Task 4 mandated, and the Markdig renderer counts, and the report labels harness-derived vs session-measured figures; lockfile + measurements/ un-gitignored (originals lost with the worktree). (4) The 148→0 blanking is amplified by the probe's own v-if/useAsyncData shape, and the 2.26x is the payload-MAXIMISING async-data path — both now scoped. (5) Node CHANNEL ANALYSIS WAS WRONG — npx and the extension host ALREADY require Node; the standalone binary is what breaks, and the currency is ~184 MB toolchain + ~130 s COLD build (headline used the WARM 37.1 s). 23.5 STAYS ahead of 23.4 on corrected premises. (6) 'strict-dynamic' CONTRADICTS ADR 0005's "the body carries no scripts of its own" — ADR trigger had been checked only against 0009; 23.4 now owns proposing that amendment. Gate propagated into this file and epics.md (execution order 23.2 → 23.3 → 23.5 → 23.4). Original dev-story note follows. # dev-story 2026-07-23: feasibility spike DONE on branch spike/nuxt-ir-23-1 (worktree, branched off 9243de5; frontmatter baseline_commit b8be08d preserved per workflow rule but predates two intervening commits — scope diffs against 9243de5). Durable deliverable = 23-1-spike-report.md (NOT a new ADR — ADR 0009 already decided; it stands UNAMENDED, nothing measured contradicts it). Quarantined Nuxt 3 app spike/nuxt-ir/ renders 4 REAL surfaces (dashboard + 3 Markdig-heavy prose pages) from the shipped SpaDelivery output as PROXY IR (22.2 still backlog, same move 22.1 made); all SpaDelivery knowledge confined to ir/adapter.mjs. AC#1 NFR6 HOLDS — prerender emits fully-rendered HTML (dashboard 345,264 B / 148 inline SVGs / 570 links with EVERY <script> stripped), route-per-file on disk, literal <a href> nav; confirmed LIVE in a real browser under the shipped webview CSP with all modules blocked and __vue_app__===false (a genuine zero-JS render, not a file inspection). AC#2 PARITY ACHIEVED — <main> BYTE-IDENTICAL golden→IR→Nuxt on 3 of 4 surfaces, v-html round-trips the IR string verbatim on all 4 (no re-serialization/attribute reorder), and every custom Markdig renderer survives at counts identical to golden (Mermaid 5, ref-chips 34, comment annotations 1, swatches 35/48, gherkin 9/1, capability 1, tables 3/5, inline SVG 115) — so the ~889 LOC custom-renderer fidelity risk ADR 0009 named is a NON-risk when its output travels as data. 3 enumerated deltas, ALL IR-capture artefacts and NONE introduced by Nuxt: 277 B dashboard delta (SpaDelivery drops 5 anchors incl. 3 code/*.html links from the git-pulse panel — a LIVE defect in shipped code, follow-up), the nav local-context band, and the <head> (ordinary 23.3 scope). Scoped CSS compiles as expected BUT does NOT reach v-html'd markup without :deep() — affects every 23.2 component. AC#3 CSP VERDICT: Nuxt CAN emit nonces (Nitro render:html stamps all 3 scripts with __NONCE__, composing with the host's existing substitution) but hydration does NOT survive the shipped policy — a nonce does not propagate to a module's STATIC IMPORTS, and default-src 'none' blocks the _payload.json fetch. LOAD-BEARING: the PARTIAL fix is WORSE than none — 'strict-dynamic' without connect-src lets hydration run, find no payload, and DELETE the prerendered content (148 SVGs → 0) on a page that rendered perfectly with JS fully blocked; verified sufficient fix = 'strict-dynamic' + experimental.payloadExtraction:false (two-knob ATOMIC edit, owned by 23.4). One un-nonced inline script remains and it is SpecScribe's OWN sunburst-explorer-data island from the IR (20.9 KB), which the webview already strips. NODE COST: npm ci 18.4 s, node_modules 183.9 MB (build-time only), nuxt generate 37.1 s for ALL 918 routes (+57% generation wall-clock; ~22 s fixed floor + ~17-24 ms/route, scaling benign), output 129 MB vs C# 57 MB = 2.26× — overhead ENTIRELY hydration payload (prerendered HTML 56.5 MB lands within 1% of C#), so any 23.x story that ignores payload duplication doubles the site. crawlLinks:true is UNUSABLE (Nitro crawls the injected IR's own links and 404s the build) — route table must come from the IR manifest. GATE: 23.2 proceed RE-SCOPED (+ :deep() convention for v-html'd IR content; measure server-components/<NuxtIsland> against payload duplication FIRST), 23.3 proceed as scoped (+ head projection), 23.4 proceed but GATED behind 23.5 and owning the CSP two-knob edit with a content-survives regression test, 23.5 RE-SCOPED and RESEQUENCED AHEAD of 23.4 — prerendering is inherently PER-PROJECT so "build at CI, ship pre-built assets" does not cover rendering the user's own project; either the shipped artefact becomes a client-rendered SPA (forfeits the NFR6 baseline AC#1 just proved) or generate needs Node at runtime (forfeits the self-contained binary). That tension is Epic 23's REAL risk and is explicitly NOT solved here. NO production code shipped (src/tests git-confirmed untouched, slnx still 2 projects, node_modules excluded by SiteGenerator.cs:4110). HONEST CORRECTION recorded rather than glossed: the task's "site byte-identical with or without the spike folder" is FALSE and could not hold for any spike — SpecScribe documents its own repo, so the folder adds 13 code pages (code/spike/nuxt-ir/**) exactly as code/spike/vscode/** and code/spike/delivery/** already do; what holds is that RENDERING BEHAVIOUR is unchanged. Full suite 2,169 passed / 3 skipped / 1 failed — the failure is PRE-EXISTING GoldenContentFingerprint stale-constant drift (wants 1eaefe51a347…), reproduced BYTE-IDENTICALLY on a clean detached worktree of 9243de5 with the spike absent (same class 22.1 reported); one transient git-insights flake did not reproduce.
