  epic-22: in-progress # delivery evolution: JSON IR canonical + incremental event-driven generation (SCP 2026-07-20, correct-course); design-locked by ADR 0008; opened with spike 22.1 (dev-story 2026-07-23); does not disturb Epic 7
  22-1-spike-incremental-recompute-and-ir-delta-transport: review # dev-story 2026-07-23: measurement spike done. Quarantined probe spike/ir-incremental/ drove the real SiteGenerator against a mutable copy of this repo's artifacts; incremental watch-route output diffed byte-for-byte vs a cold full-regen oracle. HEADLINE (AC#1): RegenerateEpics is NOT oracle-faithful even at NO-OP — 56-page work-graph over-count on every epic (Epic 1: 16 items/20 links incr vs 13/12 oracle) — the primary correctness risk ADR 0008 named, MEASURED (pre-existing shipped-watch defect, not Epic-22-introduced). Correctness (AC#2): holds ONLY for content-only generic-doc edits (GenerateOne = byte-perfect); every topology change strands the surfaces no narrow route refreshes (Code Map, delivery cadence, reference-graph citations `epics/story-9-4.html`, ADR code-view pages, orphan/prune gaps) → full-rebuild fallback required for those. Latency: incremental 3×–84× vs full; deep-git increment only ~14% of gen-time at 1211 pages (updates ADR-0008 "git-dominated ~3.2s" premise — page rendering now dominates). IR-delta (AC#2): "byte-blind chunker" premise STALE — SpaDelivery.MaxChunkBytes=2MB already ships; but chunk-level delta is coarse (1-line edit re-ships 9 chunks/19.3MB/39.9% of a 48MB IR). GATE (AC#3): 22.2 proceed RE-SCOPED (byte-cap done → aim page-level delta granularity + cap oversized pages); 22.3/22.4 proceed as scoped; 22.5 RE-SCOPE required (fix _workGraph parity + add topology invalidation for cross-artifact seams, full-rebuild fallback until proven, adopt the spike's oracle-diff harness as acceptance test); 22.6 gated on 22.2's finer delta. Durable deliverable = 22-1-spike-report.md (NOT a new ADR — ADR 0008 already decided). NO production code shipped (src/tests untouched, site byte-identical; the 1 golden-fingerprint test failure is a PRE-EXISTING stale-constant drift reproduced identically on clean main @ b9582a4 — actual hash 3e0d2bd3…, unrelated to this spike). Follow-up: the