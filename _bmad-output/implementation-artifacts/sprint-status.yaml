ure-SVG/no-JS rule (front-runs Epic 20's interactive-explorer budget). ImpactFile gained Churn+Commits (per-commit epic/story-grain dedup); ImpactMapTemplater emits an embedded JSON payload + epic multi-select + legend + treemap mount, keeping the (now churn-ranked) epic-grouped list as the noscript/text-equivalent fallback; new zero-dep initImpactMap squarify JS. Live-browser E2E verified (188 tiles, Charts.cs=8772 lines/98 commits=top level, Epic 6→98 / 6+7 merged→142 dedup, None→empty state, click-through to code pages, no console errors; one squarify .value bug found+fixed). +3 tests, full suite 2150 green, golden regenerated (asset-byte deltas). FOLLOW-UP 2026-07-23 (owner feedback): added an Impact Map nav icon (Icons.ForConcept), swapped the epic chip-row for the sprint board's sprint-epic-filter multi-select dropdown (with live count), and added a Treemap|Sunburst board-tabs toggle + a new zero-dep JS sunburst renderer (two-ring radial of the same merged hierarchy). Live-verified (nav icon, dropdown count, toggle swap, both shapes re-render on filter). Full suite 2158 green; golden regenerated again. baseline 7d8882e. create-story 2026-07-22: Planning ↔ Code Impact Map seeded. Epic 19 (its nominal "reuse the work-graph edges" dependency) confirmed ready-for-dev/no-code at time of writing -- this story builds its own narrow epic/story-to-file correlation directly rather than waiting, leaving a fold-in note for whichever Epic 19 story lands later. OWNER-ELICITED DATA-SOURCE DECISION: git commit-message + merge-branch-name mining (Tier 1 direct match + Tier 2 linear merge-boundary backfill), validated against the real EpicsModel roster -- NOT Epic 7's [Source:] citation mechanism, explicitly rejected as the primary source since the goal is correlating from commit/branch signals any team's repo already has, zero new authoring convention required. Validated live against this repo's own git history (merge commits carry the branch name in Subject but zero numstat Files; branch names like spike/delivery-arch-6-6 and worktree-bmad-dev-story-3-8 map to real stories; many commits like "Adjustments"/"Overnight code review" have no identifiable number and must resolve to no-attribution, never guessed). OWNER-ELICITED VISUAL: dedicated impact-map.html page (epic-grouped touched-file lists) PLUS a compact "Code areas touched" widget embedded on each epic's own page and each story's own page (NextStepsHtml-style opaque fragment, Story 6.2 discipline) -- no dashboard strip, diverging from 21.1/21.2's placement pattern. New nav gate is hasEpics && hasDeepAnalytics (a genuine new combined condition, not the bare shared hasEpics gate 21.1/21.2 use), since the correlation needs --deep-git's DeepGitPulse.Commits data to exist at all. New ChartMetric.PlanningCodeImpact case. Reuses CodeReferenceScanner.TryResolveRepoFile only for link-validity gating, never as the attribution source. No hard dependency; schedulable independently (SCP 2026-07-19).
