  23-5-packaging-reconciliation-node-build-step: backlog # GATED by 23.1 spike: RE-SCOPED and RESEQUENCED AHEAD OF 23.4 — no longer an end-of-epic tidy-up, it is Epic 23's LOAD-BEARING UNKNOWN. Prerendering is inherently PER-PROJECT (routes come from the user's IR), so "build Nuxt at CI time and ship pre-built assets" does NOT cover rendering the user's own project. Must decide between per-project prerender-at-generate-time (Node in the critical path) and a client-rendered shipped SPA (forfeits the NFR6 baseline 23.1 just proved) BEFORE 23.4 retires the C# renderer that today satisfies both. SCOPE ON CORRECTED PREMISES (code review 2026-07-23): the spike's claim that "neither npx (16.8) nor the Marketplace channel (16.5) could stay Node-runtime-free" was WRONG — both ALREADY require Node by construction (npx is invoked by npm; the extension host IS Node). The channel variant (c) genuinely breaks is the STANDALONE SELF-CONTAINED BINARY, and the real currency is ~184 MB of build toolchain plus a ~130 s COLD build (the headlined +57%/37.1 s is the WARM number), not Node's availability. Evaluate npx on its merits rather than excluding it.
  23-4-migrate-remaining-surfaces-retire-c-sharp-html-adapter: backlog # GATED by 23.1 spike: proceed but BLOCKED until 23.5 answers packaging (see the sequence note above) — retiring HtmlRenderAdapter is irreversible. 23.4 also OWNS the webview CSP change as a TWO-KNOB ATOMIC EDIT ('strict-dynamic' + experimental.payloadExtraction:false) with a regression test asserting prerendered content SURVIVES: the half-applied fix is WORSE than none (hydration runs, finds no payload, and deletes the rendered DOM). AND 23.4 must PROPOSE AN ADR 0005 AMENDMENT when it makes that change — 'strict-dynamic' contradicts ADR 0005's explicit property "the body carries no scripts of its own", and broadens a deliberately hardened policy on a surface rendering HTML derived from the user's own repo markdown; the 23.1 spike checked the ADR-amendment trigger only against ADR 0009 and missed this.
