name: Publish Docs Live to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "_bmad-output/**"
      - "docs/adrs/**"
      - "src/SpecScribe/**"
      - "SpecScribe.slnx"
      - "src/SpecScribe/SpecScribe.csproj"
      - ".github/workflows/publish-docs-live-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
          cache: true
          cache-dependency-path: src/SpecScribe/SpecScribe.csproj

      - name: Build static files
        id: build
        run: |
          dotnet run --project src/SpecScribe -- generate \
            --source _bmad-output \
            --adrs docs/adrs \
            --output SpecScribeOutput \
            --project-name SpecScribe

      - name: Validate generated output
        run: |
          test -d SpecScribeOutput
          test -s SpecScribeOutput/index.html

      - name: Upload static files as artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: SpecScribeOutput

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
